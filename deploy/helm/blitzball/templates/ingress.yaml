apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blitzball-ingress
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: blitzball-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: blitzball-frontend
            port:
              number: 80