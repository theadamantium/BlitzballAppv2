services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: blitzball
      POSTGRES_USER: blitzball
      POSTGRES_PASSWORD: REDACTED_FOR_SECURITY
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "postgresql+psycopg://blitzball:REDACTED_FOR_SECURITY@postgres:5432/blitzball"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data: